<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citampi Stories Wiki - Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header-wrapper">
    <header class="hero">
        <div class="hero-board">
            <div class="hud-badge">
                <i class="fa-solid fa-circle"></i> untuk versi APK 1.84.110
            </div>
            <h1>Citampi Stories <span>Guide</span></h1>
            <p>Pusat database, dokumentasi, dan panduan strategi interaktif terlengkap untuk Citampi Stories.</p>
        </div>

        <div class="search-container-holder">
            <div class="search-box-wrapper" id="sticky-search">
                <div class="search-inner-box">
                    <input type="text" id="live-search" placeholder="Cari info Isma, Job Guru, Crafting Semen..." autocomplete="off">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <i class="fa-solid fa-xmark clear-icon" id="clear-search"></i>
                    <div class="search-results" id="search-results"></div>
                </div>
            </div>
        </div>
    </header>
</div>

<div class="main-content">
    <div class="cards-grid" id="main-cards"></div>
</div>

<div class="popup-overlay" id="popup-overlay">
    <div class="popup-box" id="popup-box">
        <div class="popup-header" id="popup-header">
            <div class="popup-header-left">
                <div class="popup-header-icon" id="popup-icon"></div>
                <div>
                    <div class="popup-title" id="popup-title"></div>
                    <div class="popup-subtitle" id="popup-subtitle"></div>
                </div>
            </div>
            <button class="popup-close" id="popup-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="popup-body" id="popup-body"></div>
    </div>
</div>

<footer>
    <p>Citampi Stories Guide &copy; 2026</p>
</footer>

<script src="database-npc.js"></script>
<script src="database-item.js"></script>
<script src="script.js"></script>
</body>
</html>
